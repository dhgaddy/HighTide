apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: vlsida
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1
  template:
    spec:
      initContainers:
      - name: clone-repo
        image: alpine/git
        command: ["sh", "-c"]
        args:
        - |
          set -e
          git clone --single-branch --branch __BRANCH__ --depth=1 \
            https://github.com/VLSIDA/HighTide.git /repo
          # Only the bazel-orfs submodule is needed for the build.
          # designs/src/<d>/dev/repo and bsg_fakeram submodules are used
          # only by update-rtl / generate-sram paths.
          cd /repo
          git submodule update --init --depth=1 bazel-orfs
        volumeMounts:
        - name: repo
          mountPath: /repo
      containers:
      - name: build
        # Pin ubuntu:24.04 by digest so apt repo content can't drift between
        # pods. Drift in transitive C/C++ dep versions changes OpenROAD's
        # build-from-source binary hash, which invalidates every cached ORFS
        # action from 2_floorplan onwards. Bump this manually after auditing
        # if you need newer apt packages.
        image: ubuntu:24.04@sha256:c4a8d5503dfb2a3eb8ab5f807da5bc69a85730fb49b5cfca2330194ebcc41c7b
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail

          # Install dependencies:
          #   curl  — bazelisk download
          #   git   — bazel-orfs fetch
          #   build-essential + libxml2 — link-time deps for Bazel CC toolchain
          #     (ld.lld from toolchains_llvm dlopens libxml2.so.2)
          #   python3/time/numpy/yaml — ORFS flow scripts
          #   libx11-xcb1 + libxcb-* + libxkbcommon-x11-0 — runtime deps for
          #     OpenROAD built with --@openroad//:platform=gui (bazel-orfs .bazelrc);
          #     binary DT_NEEDEDs libX11-xcb.so.1 even when run headlessly
          #   xvfb — virtual X server for `xvfb-run`; required by the gallery
          #     target which runs OpenROAD with -gui to render a routed image
          apt-get update -qq && apt-get install -y -qq \
            curl git build-essential time libxml2 \
            python3 python3-yaml python3-numpy \
            xvfb \
            libx11-xcb1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render0 libxcb-render-util0 \
            libxcb-shape0 libxcb-shm0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libsm6 libice6 \
            libxkbcommon0 libxkbcommon-x11-0 libdbus-1-3 libegl1 \
            libfontconfig1 libglib2.0-0 \
            >/dev/null 2>&1

          # Install bazelisk as bazel — pinned to a specific release tag so
          # bazelisk-itself doesn't drift between pods. Bazelisk just routes
          # to the version in .bazelversion (8.5.0), but a different
          # bazelisk binary can still leak into action keys via env/PATH.
          curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.29.0/bazelisk-linux-amd64
          chmod +x /usr/local/bin/bazel

          cd /repo

          # Build the design with remote cache (upload if credentials available).
          # BAZEL_CACHE_URL is injected from the bazel-cache-creds Secret in the form
          # https://USER:TOKEN@cache.hightide-benchmarks.dev.  When unset (Secret missing
          # or readers without write access), fall back to the public read-only URL.
          if [ -n "${BAZEL_CACHE_URL:-}" ]; then
            echo "Cache credentials found, enabling cache upload"
            CACHE_FLAGS="--remote_cache=$BAZEL_CACHE_URL --remote_upload_local_results=true"
          else
            echo "WARNING: cache credentials not found, cache is read-only"
            CACHE_FLAGS="--remote_cache=https://cache.hightide-benchmarks.dev"
          fi

          # When uploading artifacts, force download of all intermediate
          # outputs (logs, reports, results) so we capture them on cache hits.
          if [ "__UPLOAD_ARTIFACTS__" = "true" ]; then
            CACHE_FLAGS="$CACHE_FLAGS --remote_download_outputs=all"
          fi

          # Capture build exit code so we can save artifacts even on failure
          BUILD_RC=0
          bazel build $CACHE_FLAGS __BAZEL_TARGET__ || BUILD_RC=$?

          # Copy build artifacts to persistent storage (when enabled)
          if [ "__UPLOAD_ARTIFACTS__" = "true" ]; then
            # Extract design path from bazel target //designs/<platform>/<design>:<name>
            TARGET="__BAZEL_TARGET__"
            DESIGN_PATH="${TARGET#//}"
            DESIGN_PATH="${DESIGN_PATH%%:*}"

            ARTIFACT_DIR="bazel-bin/${DESIGN_PATH}"
            if [ -d "$ARTIFACT_DIR" ]; then
              DEST="/artifacts/${DESIGN_PATH}"
              echo "Copying build artifacts to $DEST..."
              rm -rf "$DEST"
              mkdir -p "$DEST"
              # Resolve symlinks (bazel-bin is a symlink tree to bazel-out)
              cp -rL "$ARTIFACT_DIR"/* "$DEST/" 2>/dev/null || true
              # Remove runfiles (not useful for debug)
              find "$DEST" -name '*.runfiles' -type d -exec rm -rf {} + 2>/dev/null || true
              find "$DEST" -name '*.runfiles_manifest' -delete 2>/dev/null || true
              echo "Artifacts saved to $DEST/"
              du -sh "$DEST"
            else
              echo "WARNING: artifact directory $ARTIFACT_DIR not found"
            fi
          fi

          exit $BUILD_RC
        env:
        - name: BAZEL_CACHE_URL
          valueFrom:
            secretKeyRef:
              name: bazel-cache-creds
              key: url
              optional: true
        volumeMounts:
        - name: repo
          mountPath: /repo
        - name: artifacts
          mountPath: /artifacts
        resources:
          requests:
            memory: __MEM_REQUEST__
            cpu: __CPU_REQUEST__
            ephemeral-storage: __EPH_REQUEST__
          limits:
            memory: __MEM_LIMIT__
            cpu: __CPU_LIMIT__
            ephemeral-storage: __EPH_LIMIT__
      volumes:
      - name: repo
        emptyDir: {}
      - name: artifacts
        persistentVolumeClaim:
          claimName: hightide-artifacts
      restartPolicy: Never
